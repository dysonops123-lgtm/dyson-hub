<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dyson Thailand — TikTok Live Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.2);
    --text: #f0f0f0; --text-muted: #888; --text-dim: #555;
    --accent: #e8e0d0; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  html { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
  header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 3rem; gap: 1rem; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-logo { width: 52px; height: 52px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .brand-info h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .brand-info p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .header-right { text-align: right; }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(212,68,68,0.12); border: 1px solid rgba(212,68,68,0.25); color: #e06060; font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 20px; font-family: var(--mono); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #d44; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .branch-count { font-size: 12px; color: var(--text-dim); margin-top: 6px; font-family: var(--mono); }
  .search-wrap { position: relative; margin-bottom: 2rem; }
  .search-wrap input { width: 100%; padding: 13px 18px 13px 46px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--border-hover); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  .result-count { font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-top: 8px; padding-left: 2px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; text-decoration: none; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s, background 0.2s, transform 0.15s; animation: fadeUp 0.35s ease both; }
  .card:hover { border-color: var(--border-hover); background: var(--surface2); transform: translateY(-2px); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .card-top { display: flex; align-items: center; justify-content: space-between; }
  .card-icon { width: 36px; height: 36px; background: rgba(232,224,208,0.07); border: 1px solid rgba(232,224,208,0.1); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .card-num { font-size: 11px; color: var(--text-dim); font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 6px; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; }
  .card-tag { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
  .empty { display: none; text-align: center; padding: 4rem 2rem; color: var(--text-dim); font-size: 14px; }
  footer { margin-top: 3.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
  footer p { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  @media (max-width: 500px) {
    .wrap { padding: 2rem 1rem 3rem; }
    .header-right { text-align: left; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="11" stroke="#0a0a0a" stroke-width="2"/>
          <circle cx="14" cy="14" r="5" fill="#0a0a0a"/>
          <line x1="14" y1="3" x2="14" y2="8" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="20" x2="14" y2="25" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="14" x2="8" y2="14" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="14" x2="25" y2="14" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-info">
        <h1>Dyson Thailand</h1>
        <p>TikTok Live Calendar Hub</p>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot"></span>TikTok Live</div>
      <div class="branch-count">20 สาขา</div>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input type="text" id="search" placeholder="ค้นหาสาขา เช่น Pinklao, Siam, Chiangmai..." />
    <div class="result-count" id="result-count">แสดงทั้งหมด 20 สาขา</div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">ไม่พบสาขาที่ค้นหา</div>

  <footer>
    <p>Dyson Thailand &copy; 2026</p>
    <p id="footer-time"></p>
  </footer>
</div>
<script>
const branches = [
  {num:1,  name:"Central Pinklao",            url:"https://docs.google.com/spreadsheets/d/1PaCQwD3xCqTF5EFsPbOtH0rbs9Ae9TZMwcZ4ojcDVQQ/edit?usp=drive_link"},
  {num:2,  name:"Central Hatyai",             url:"https://docs.google.com/spreadsheets/d/18WHnBcealRDDUY3KLhdZsuXeqb0WjshmVcv247295Vw/edit?usp=drive_link"},
  {num:3,  name:"Central Ladprao",            url:"https://docs.google.com/spreadsheets/d/14FDBlrJ0X6umhfmKZTeidLB3E-yoZpQq9i_SmoTGFrc/edit?usp=drive_link"},
  {num:4,  name:"Central Rama 2",             url:"https://docs.google.com/spreadsheets/d/1tsdoFzxQsL5p_oUbecbo4lGnamJIpG0Rg4Cu_Xgxd7Y/edit?usp=drive_link"},
  {num:5,  name:"Fashion Island",             url:"https://docs.google.com/spreadsheets/d/1-qSC4xCYdPYfZS3bLRpjqDz_NlJDes9CvmnxtJOf_Zg/edit?usp=drive_link"},
  {num:6,  name:"Mega Bangna",                url:"https://docs.google.com/spreadsheets/d/1i8F6YFSsCzmVj0-T8Xc6tSPqzGtzmwuZyVYpW5v7qVA/edit?usp=drive_link"},
  {num:7,  name:"Zpell Future Park Rangsit",  url:"https://docs.google.com/spreadsheets/d/1UGDvAoPVBAAV5631oUXnq0FU05SowfziUw4bDdi88zQ/edit?usp=drive_link"},
  {num:8,  name:"CentralWorld",               url:"https://docs.google.com/spreadsheets/d/1lV5I130sRnvsJAAAOE0FtY-hIpW2597bJ7TXXgG3NHs/edit?usp=drive_link"},
  {num:9,  name:"Icon Siam",                  url:"https://docs.google.com/spreadsheets/d/1uOQbaE48vtW-7hqPnwVesU8ijWRl0UrXGw936CRW3x4/edit?usp=drive_link"},
  {num:10, name:"Central Westgate",           url:"https://docs.google.com/spreadsheets/d/1OEbcTYzH-Cr9PbXomWVnLZ7AHRN4epJfKPe74ZcT5T4/edit?usp=drive_link"},
  {num:11, name:"Central Chonburi",           url:"https://docs.google.com/spreadsheets/d/1LrHa9xtYt8hBPAzUGo_bNghqkl76ECa2IHFnQ6Vo5iw/edit?usp=drive_link"},
  {num:12, name:"Central Festival Chiangmai", url:"https://docs.google.com/spreadsheets/d/1VajhIQcra6FjA8cV15F4j80Gn-5MIE1SWYe6SEYZp8U/edit?usp=drive_link"},
  {num:13, name:"Central Rama 9",             url:"https://docs.google.com/spreadsheets/d/16dB13db1mV63iVSP1s_7fPMl0d5I0bODJvUNGKSkq4I/edit?usp=drive_link"},
  {num:14, name:"Central KhonKaen",           url:"https://docs.google.com/spreadsheets/d/1wPIvjQFtngHuIf-G0YjDrJWxcjgbR32f6zwomlsPGec/edit?usp=drive_link"},
  {num:15, name:"Central Park Dusit",         url:"https://docs.google.com/spreadsheets/d/1g662uTBwVpg7qK_nZo3L4x1EgsBzp2Y48HuGrtnJ4bk/edit?usp=drive_link"},
  {num:16, name:"Siam Paragon",               url:"https://docs.google.com/spreadsheets/d/1N3o5cZNunY8rVv0Xcb9zUZxbMu6INHH_ZJc2MhxcXLk/edit?usp=drive_link"},
  {num:17, name:"Central Nakhon Sawan",       url:"https://docs.google.com/spreadsheets/d/1F_vgDrV57G-uA_T1A__QkMKkr7uzhhROKnPpRkyW2j0/edit?usp=drive_link"},
  {num:18, name:"Central Festival Phuket",    url:"https://docs.google.com/spreadsheets/d/1Hv20fo6P36jTUKCDk52BlRc9arCj6qxSRULR0wFJySY/edit?usp=drive_link"},
  {num:19, name:"Central Village",            url:"https://docs.google.com/spreadsheets/d/1g-VW87MCdwvmUh5CN9auyf15yPSOk-QddhrGEyWW9Nw/edit?usp=drive_link"},
  {num:20, name:"CMG Outlet",                 url:"https://docs.google.com/spreadsheets/d/1-pGd81LNZPgQhJ-dYI0JUfUIQ3m50bre1t8yLOI_mAs/edit?usp=drive_link"},
];
const sheetIcon=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c8bca8" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`;
const arrowIcon=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>`;

function renderCards(list){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const rc=document.getElementById('result-count');
  grid.innerHTML='';
  if(!list.length){empty.style.display='block';rc.textContent='ไม่พบผลลัพธ์';return;}
  empty.style.display='none';
  rc.textContent=list.length===branches.length?`แสดงทั้งหมด ${branches.length} สาขา`:`พบ ${list.length} สาขา`;
  list.forEach((b,i)=>{
    const a=document.createElement('a');
    a.className='card'; a.href=b.url; a.target='_blank'; a.rel='noopener';
    a.style.animationDelay=`${i*0.03}s`;
    a.innerHTML=`<div class="card-top"><div class="card-icon">${sheetIcon}</div><span class="card-num">#${String(b.num).padStart(2,'0')}</span></div><div class="card-name">${b.name}</div><div class="card-tag">${arrowIcon}TikTok Live Calendar</div>`;
    grid.appendChild(a);
  });
}
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  renderCards(!q?branches:branches.filter(b=>b.name.toLowerCase().includes(q)||String(b.num).includes(q)));
});
function updateTime(){
  document.getElementById('footer-time').textContent=
    new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour12:false,year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
updateTime(); setInterval(updateTime,60000);
renderCards(branches);
</script>
</body>
</html>
